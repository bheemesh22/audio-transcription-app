<!DOCTYPE html>
<html>
<head>
    <title>Audio Transcript System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2b5876, #4e4376);
            min-height: 100vh;
            color: white;
        }

        nav {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00f5ff;
        }

        .container {
            width: 85%;
            margin: 40px auto;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h2, h3 {
            margin-top: 0;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }
        .btn-success:hover {
            transform: scale(1.05);
        }
        .btn-danger:hover {
            transform: scale(1.05);
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: rgb(250, 248, 248);
        }

        .btn-success {
            background: linear-gradient(45deg, #00b09b, #96c93d);
            color: white;
        }

        input[type="text"], input[type="file"], input[type="password"] {
            padding: 10px;
            border-radius: 10px;
            border: none;
            width: 100%;
            margin-bottom: 10px;
        }

        .box {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .box h4 {
            margin-top: 0;
            color: #00f5ff;
        }

        .flash {
            background: rgba(0,255,150,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav style="position:stick;">
    <div><b>🎙 Audio Transcript</b></div>
    <div>
        {% if session.username %}
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('history') }}">History</a>
            {% if session.is_admin %}
            <a href="{{ url_for('admin') }}">Admin</a>
            {% endif %}
            <a href="{{ url_for('logout') }}">Logout</a>
        {% endif %}
    </div>
</nav>

<div class="container">

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
