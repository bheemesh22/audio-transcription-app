<h2>Admin Panel</h2>

<h3>Users</h3>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Action</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>
            {% if user.username != 'admin' %}
            <a href="{{ url_for('admin_delete_user', user_id=user.id) }}">Delete</a>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

<br><br>

<h3>All Transcripts</h3>
<table border="1">
    <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Title</th>
        <th>Action</th>
    </tr>
    {% for t in transcripts %}
    <tr>
        <td>{{ t.id }}</td>
        <td>{{ t.user_id }}</td>
        <td>{{ t.title }}</td>
        <td>
            <a href="{{ url_for('admin_delete_transcript', id=t.id) }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
